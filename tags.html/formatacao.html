<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação</title>
</head>
<body>
    <h1>Formatações</h1>
    <hr>
    <P><strong>Esse é um texto em negrito</strong> usando uma tag semântica</P>
    <p><em>Esse é um texto com ênfase, </em> usando um tag sêmantica</p>
    <p>Minha casa tem 80m <sup>2</sup></p>
    <p>A composição química da água é H <sub>2</sub>O</p>
</body>
</html>
